name: sync-openings

on:
  schedule:
    - cron: '17 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-openings-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build openings data
        run: python tools/build_openings.py

      - name: Commit openings data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/openings.json data/openings.js
          if git diff --staged --quiet; then
            echo "No openings data changes."
          else
            git commit -m "chore: sync faculty openings [skip ci]"
            git push
          fi
