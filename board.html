<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PhD / RA / Postdoc 机会 · 博士栈</title>
<link rel="icon" href="./favicon.svg" type="image/svg+xml">
<meta name="description" content="博士栈 PhD、RA、Postdoc、Intern 机会列表，按学校分组，可搜索和筛选。">
<style>
  :root{--ink:#16181d; --muted:#5b6270; --line:#e6e8ec; --bg:#fff; --accent:#1f6feb; --accent-ink:#fff; --warn:#b45309; --soft:#f7f8fa; --control-h:88px}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);line-height:1.45;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  a{color:inherit}
  .nav{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:14px 18px;border-bottom:1px solid var(--line)} .nav-brand{font-weight:700;font-size:18px;color:var(--ink);text-decoration:none} .nav-brand .en{color:var(--muted);font-weight:600;font-size:13px;margin-left:6px} .nav-links{display:flex;gap:18px;flex-wrap:wrap;font-size:14px} .nav-links a{color:var(--muted);text-decoration:none} .nav-links a:hover{color:var(--ink)} .nav-links a.active{color:var(--ink);font-weight:600}
  .wrap{max-width:900px;margin:0 auto;padding:16px 18px 44px}
  .hero{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin:6px 0 12px}
  h1{margin:0 0 4px;font-size:24px;line-height:1.2;letter-spacing:0}
  .meta{margin:0;color:var(--muted);font-size:13px}
  .source-button{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;min-height:34px;border:1px solid var(--accent);border-radius:7px;background:var(--accent);color:var(--accent-ink);font-size:13px;font-weight:650;line-height:1.2;text-decoration:none;padding:7px 10px;white-space:nowrap}
  .source-button:hover{filter:brightness(.96)}
  .source-button[hidden]{display:none}
  .controls{position:sticky;top:0;z-index:5;background:var(--bg);border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin:0 -18px 8px;padding:8px 18px}
  .control-grid{display:grid;grid-template-columns:minmax(0,1.2fr) minmax(150px,.8fr);gap:8px}
  .field label,.chip-label{display:block;margin:0 0 3px;color:var(--muted);font-size:11px;font-weight:650;line-height:1.2}
  input[type="search"],select{width:100%;min-height:36px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--ink);font:inherit;font-size:13px;line-height:1.25;padding:7px 9px}
  input[type="search"]:focus,select:focus{outline:2px solid rgba(31,111,235,.18);border-color:var(--accent)}
  .chip-block{min-width:0}
  .chip-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
  .chip input{position:absolute;opacity:0;pointer-events:none}
  .chip span{display:inline-flex;align-items:center;justify-content:center;min-height:32px;border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--muted);font-size:12px;font-weight:650;line-height:1;padding:7px 11px;cursor:pointer;user-select:none}
  .chip input:checked + span{border-color:var(--accent);background:var(--accent);color:var(--accent-ink)}
  .chip.warn input:checked + span{border-color:var(--warn);background:var(--warn);color:#fff}
  .chip input:focus-visible + span{outline:2px solid rgba(31,111,235,.28);outline-offset:2px}
  .control-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-top:7px}
  .result-count{color:var(--muted);font-size:12px;line-height:1.2}
  .control-actions{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  button{min-height:32px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--ink);font:inherit;font-size:12px;line-height:1.1;padding:7px 10px;cursor:pointer}
  button:hover{border-color:#c9ced8;background:#fbfbfc}
  button:focus-visible{outline:2px solid rgba(31,111,235,.28);outline-offset:2px}
  .list{display:block}
  .school-group{margin:0}
  .school-head{position:sticky;top:var(--control-h);z-index:3;display:flex;align-items:center;justify-content:space-between;gap:10px;background:#eef2f8;border-top:1px solid var(--line);border-bottom:1px solid #d6dde8;border-left:3px solid var(--accent);padding:6px 10px;font-size:13px;line-height:1.25}
  .school-name{font-weight:800;color:var(--ink);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .school-count{flex:0 0 auto;color:var(--muted);font-size:12px;font-variant-numeric:tabular-nums}
  .school-count .short{color:var(--warn);font-weight:750}
  .term-block{margin-top:8px}
  .opening-row{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:start;gap:0 8px;border-bottom:1px solid var(--line);padding:5px 0}
  .row-main{min-width:0;display:flex;align-items:center;gap:2px 5px;flex-wrap:wrap;font-size:13px;line-height:1.35}
  .faculty{font-weight:750;color:var(--ink);text-decoration:none;white-space:nowrap}
  .faculty:hover{color:var(--accent);text-decoration:underline}
  .faculty-arrow{color:var(--accent);font-size:11px;margin-left:2px}
  .sep{color:#9aa1ad}
  .topic{min-width:8ch;flex:1 1 260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink)}
  .badge{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:999px;background:#f6f8fb;color:#334155;font-size:11px;font-weight:750;line-height:1;padding:3px 6px;white-space:nowrap}
  .badge.short{border-color:rgba(180,83,9,.28);background:#fff7ed;color:var(--warn)}
  .badge.long{color:var(--muted);background:#fff}
  .when,.contact{min-width:0;color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .when{max-width:210px}
  .contact{max-width:170px}
  .contact a{color:var(--accent);text-decoration:none}
  .contact a:hover{text-decoration:underline}
  .details-toggle{grid-column:2;grid-row:1;justify-self:end;min-height:30px;border-radius:6px;color:var(--muted);font-size:12px;line-height:1;padding:6px 9px}
  .details-toggle:after{content:"⌄";font-size:12px;margin-left:4px;color:var(--muted)}
  .details-toggle[aria-expanded="true"]{border-color:#c9ced8;color:var(--ink)}
  .details-toggle[aria-expanded="true"]:after{content:"⌃"}
  .detail-panel{grid-column:1 / -1;margin-top:5px;padding:6px 8px;background:#fbfbfc;border:1px solid var(--line);border-radius:7px;color:var(--muted);font-size:12px}
  .detail-panel[hidden]{display:none}
  .detail-panel dl{display:grid;grid-template-columns:auto minmax(0,1fr);gap:3px 8px;margin:0}
  .detail-panel dt{color:var(--ink);font-weight:700;white-space:nowrap}
  .detail-panel dd{margin:0;min-width:0;overflow-wrap:anywhere}
  .detail-panel a{color:var(--accent);text-decoration:none}
  .detail-panel a:hover{text-decoration:underline}
  .empty{border:1px solid var(--line);border-radius:8px;margin:10px 0 0;padding:20px 14px;text-align:center;color:var(--muted);background:#fbfbfc;font-size:14px}
  .hidden{display:none!important}
  @media (min-width:760px){
    .wrap{padding-top:20px}
    h1{font-size:26px}
    .controls{border:1px solid var(--line);border-radius:8px;margin:0 0 10px;padding:8px}
    .control-grid{grid-template-columns:minmax(190px,1.15fr) minmax(160px,.85fr) minmax(120px,.62fr) minmax(245px,1.35fr);align-items:end}
    .school-head{padding-left:10px;padding-right:10px}
    .opening-row{padding-left:4px;padding-right:4px}
  }
  @media (max-width:620px){
    .wrap{padding-left:12px;padding-right:12px}
    .nav{padding-left:12px;padding-right:12px}
    .hero{display:block}
    .source-button{margin-top:8px;width:100%;white-space:normal;text-align:center}
    .controls{margin-left:-12px;margin-right:-12px;padding-left:12px;padding-right:12px}
    .control-grid{grid-template-columns:1fr}
    .chip-row{gap:4px}
    .chip span{min-height:32px;padding:7px 11px}
    .school-head{top:var(--control-h);padding:5px 7px}
    .opening-row{grid-template-columns:minmax(0,1fr) auto;padding:6px 0}
    .row-main{font-size:12.5px;gap:2px 4px}
    .topic{flex-basis:100%;white-space:nowrap}
    .when{max-width:165px}
    .contact{max-width:130px}
    .detail-panel{font-size:12px}
    .detail-panel dl{grid-template-columns:1fr;gap:1px}
    .detail-panel dd + dt{margin-top:3px}
  }
  footer{max-width:900px;margin:0 auto;padding:18px;border-top:1px solid var(--line);font-size:12px;color:var(--muted);text-align:center}
  footer a{color:var(--muted)}
</style>

<script src="./data/openings.js"></script>
<script>
(function(){
  "use strict";

  var rawData = window.OPENINGS;
  var hasData = rawData && Array.isArray(rawData.openings);
  var data = hasData ? rawData : {};
  var openings = hasData ? data.openings.map(function(item, index){
    return { item: item || {}, index: index };
  }) : [];

  var summaryLine = document.getElementById("summaryLine");
  var sourceButton = document.getElementById("sourceButton");
  var controls = document.getElementById("controls");
  var searchInput = document.getElementById("searchInput");
  var universitySelect = document.getElementById("universitySelect");
  var categoryInputs = Array.prototype.slice.call(document.querySelectorAll("#categoryFilters input[type='checkbox']"));
  var typeInputs = Array.prototype.slice.call(document.querySelectorAll("#typeFilters input[type='checkbox']"));
  var termFilters = document.getElementById("termFilters");
  var termInputs = [];
  var resultCount = document.getElementById("resultCount");
  var toggleDetails = document.getElementById("toggleDetails");
  var resetButton = document.getElementById("resetButton");
  var results = document.getElementById("results");
  var emptyMessage = document.getElementById("emptyMessage");
  var expanded = false;
  var searchTimer = 0;
  var emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  var NOW = new Date();
  var NOW_CODE = NOW.getFullYear() * 12 + NOW.getMonth();

  function text(value){
    return value == null ? "" : String(value).trim();
  }

  function safeUrl(value){
    var raw = text(value);
    if (!raw) return "";
    try {
      var url = new URL(raw, window.location.href);
      if (url.protocol === "http:" || url.protocol === "https:") return url.href;
    } catch (error) {}
    return "";
  }

  function normalizedSchool(item){
    return text(item.university) || "未注明学校";
  }

  function categoryOf(item){
    return text(item.category) === "短期" ? "短期" : "长期";
  }

  // A merged card can carry BOTH categories (a PI with a 短期 deadline row + a 长期 rolling row).
  // categoryOf stays the primary for badge/sort; category filtering uses membership so such a
  // card appears under both 短期 and 长期 rather than vanishing from the 长期 view.
  function categoriesOf(item){
    if (Array.isArray(item.categories)) {
      var values = item.categories.map(text).filter(Boolean);
      if (values.length) return values;
    }
    return [categoryOf(item)];
  }
  function hasCategory(item, category){
    return categoriesOf(item).indexOf(category) !== -1;
  }

  var SEASON_ORDER = { "Spring": 0, "Summer": 1, "Fall": 2 };

  // The source `term` field is free-text ("26 Fall", "2026 Spring/Fall", "25 Fall/26 Spring",
  // typos like "Sping"). Normalize each into a set of clean "YYYY Season" tags so the filter
  // can bucket reliably; each season is attached to its nearest preceding year (then following).
  function parseTerms(raw){
    var s = text(raw).toLowerCase();
    if (!s) return [];
    s = s.replace(/sping/g, "spring").replace(/autumn/g, "fall");
    var rolling = /all year|year ?round|rolling|immediately|any ?time|long-?term effective|always welcome/.test(s);
    var seq = [];
    var tokenRe = /(20\d{2}|\d{2})|(spring|summer|fall)/g;
    var match;
    while ((match = tokenRe.exec(s))) {
      if (match[1]) {
        var num = parseInt(match[1], 10);
        var year = num < 100 ? 2000 + num : num;
        if (year >= 2020 && year <= 2035) seq.push({ year: year });
      } else {
        seq.push({ season: match[2].charAt(0).toUpperCase() + match[2].slice(1) });
      }
    }
    var seen = {};
    var tags = [];
    seq.forEach(function(token, i){
      if (!token.season) return;
      var year = null, j;
      for (j = i - 1; j >= 0; j--) { if (seq[j].year != null) { year = seq[j].year; break; } }
      if (year == null) { for (j = i + 1; j < seq.length; j++) { if (seq[j].year != null) { year = seq[j].year; break; } } }
      if (year == null) return;
      var label = year + " " + token.season;
      if (!seen[label]) { seen[label] = true; tags.push(label); }
    });
    if (rolling && !tags.length) tags.push("滚动/全年");
    return tags;
  }

  // A term tag is "past" when its intake start month is before the current month.
  // Rolling has no fixed start, so it is never past. Computed against today's date.
  function isPastTerm(tag){
    if (tag === "滚动/全年") return false;
    var parts = tag.split(" "), year = parseInt(parts[0], 10);
    var startMonth = { "Spring": 0, "Summer": 4, "Fall": 7 }[parts[1]];
    if (isNaN(year) || startMonth == null) return false;
    return (year * 12 + startMonth) < NOW_CODE;
  }

  // An opening is "past only" (belongs under the 往期 chip) when it has term tags,
  // is not rolling, and every one of them is past. A card with any upcoming term
  // (e.g. "26 Spring/Fall") is current and stays out of 往期.
  function isPastOnly(entry){
    var terms = entry.terms || [];
    if (!terms.length || terms.indexOf("滚动/全年") !== -1) return false;
    return terms.every(isPastTerm);
  }

  function norm(value){ return text(value).toLowerCase().replace(/\s+/g, " "); }

  function longest(items, key){
    var best = "";
    items.forEach(function(it){ var v = text(it[key]); if (v.length > best.length) best = v; });
    return best;
  }
  function firstNonEmpty(items, key){
    for (var i = 0; i < items.length; i++) { var v = text(items[i][key]); if (v) return v; }
    return "";
  }
  function joinUnique(items, key, sep){
    var seen = {}, out = [];
    items.forEach(function(it){ var v = text(it[key]); if (v && !seen[v]) { seen[v] = true; out.push(v); } });
    return out.join(sep);
  }
  function unionTypes(items){
    var order = ["PhD", "RA", "Postdoc", "Intern"], set = {};
    items.forEach(function(it){ (Array.isArray(it.types) ? it.types : []).forEach(function(t){ t = text(t); if (t) set[t] = true; }); });
    var out = [];
    order.forEach(function(t){ if (set[t]) { out.push(t); delete set[t]; } });
    Object.keys(set).forEach(function(t){ out.push(t); });
    return out;
  }
  function unionCategories(items){
    var set = {};
    items.forEach(function(it){ set[categoryOf(it)] = true; });
    return ["短期", "长期"].filter(function(category){ return set[category]; });
  }
  function firstValidUrl(items){
    for (var i = 0; i < items.length; i++) { if (safeUrl(items[i].homepage)) return text(items[i].homepage); }
    return "";
  }
  function firstEmail(items){
    for (var i = 0; i < items.length; i++) { var v = text(items[i].contact); if (emailPattern.test(v)) return v; }
    return "";
  }
  function unionParsedTerms(items){
    var seen = {}, out = [];
    items.forEach(function(it){ parseTerms(it.term).forEach(function(t){ if (!seen[t]) { seen[t] = true; out.push(t); } }); });
    return out;
  }

  // Merge rows for the same (faculty + school) into one card: many PIs are listed twice,
  // a 短期 deadline row plus a 长期 term row for the same recruitment. Keyed on faculty+school
  // so namesakes at different schools stay separate; rows with no faculty are left untouched.
  function mergeEntities(entries){
    var map = new Map(), order = [];
    entries.forEach(function(entry){
      var key = norm(entry.item.faculty)
        ? norm(entry.item.faculty) + "||" + norm(entry.item.university)
        : "__solo__" + entry.index;
      if (!map.has(key)) { map.set(key, []); order.push(key); }
      map.get(key).push(entry);
    });
    return order.map(function(key){
      var rows = map.get(key);
      if (rows.length === 1) { rows[0].terms = parseTerms(rows[0].item.term); return rows[0]; }
      rows.sort(function(a, b){ return a.index - b.index; });
      var items = rows.map(function(r){ return r.item; });
      var item = {
        university: firstNonEmpty(items, "university"),
        faculty: firstNonEmpty(items, "faculty"),
        category: items.some(function(it){ return text(it.category) === "短期"; }) ? "短期" : "长期",
        categories: unionCategories(items),
        types: unionTypes(items),
        interests: longest(items, "interests"),
        homepage: firstValidUrl(items) || longest(items, "homepage"),
        contact: firstEmail(items) || firstNonEmpty(items, "contact"),
        contactAll: joinUnique(items, "contact", " / "),
        term: joinUnique(items, "term", " / "),
        deadline: longest(items, "deadline"),
        positions: joinUnique(items, "positions", " / "),
        requirements: joinUnique(items, "requirements", " / "),
        materials: joinUnique(items, "materials", " / ")
      };
      return { item: item, index: rows[0].index, terms: unionParsedTerms(items) };
    });
  }

  function setupTerms(){
    var counts = {}, pastOnly = 0;
    openings.forEach(function(entry){
      (entry.terms || []).forEach(function(tag){
        if (!isPastTerm(tag)) counts[tag] = (counts[tag] || 0) + 1;
      });
      if (isPastOnly(entry)) pastOnly += 1;
    });
    var labels = Object.keys(counts);
    labels.sort(function(a, b){
      if (a === "滚动/全年") return 1;
      if (b === "滚动/全年") return -1;
      var pa = a.split(" "), pb = b.split(" ");
      var ya = parseInt(pa[0], 10), yb = parseInt(pb[0], 10);
      if (ya !== yb) return ya - yb;
      return (SEASON_ORDER[pa[1]] || 0) - (SEASON_ORDER[pb[1]] || 0);
    });
    function addChip(value, label){
      var chip = document.createElement("label");
      chip.className = "chip";
      var input = document.createElement("input");
      input.type = "checkbox";
      input.value = value;
      var span = document.createElement("span");
      span.textContent = label;
      chip.appendChild(input);
      chip.appendChild(span);
      termFilters.appendChild(chip);
    }
    labels.forEach(function(label){ addChip(label, label + " · " + counts[label]); });
    if (pastOnly) addChip("__past__", "往期 · " + pastOnly);
    termInputs = Array.prototype.slice.call(termFilters.querySelectorAll("input[type='checkbox']"));
    termInputs.forEach(function(input){ input.addEventListener("change", render); });
  }

  function createText(tag, className, value){
    var element = document.createElement(tag);
    if (className) element.className = className;
    element.textContent = text(value);
    return element;
  }

  function appendPlain(parent, value){
    parent.appendChild(document.createTextNode(value));
  }

  function clearElement(element){
    while (element.firstChild) element.removeChild(element.firstChild);
  }

  function selectedValues(inputs){
    return inputs.filter(function(input){ return input.checked; }).map(function(input){ return input.value; });
  }

  function totalCount(){
    return openings.length;
  }

  function computedCounts(){
    var shortCount = openings.filter(function(entry){ return hasCategory(entry.item, "短期"); }).length;
    var longCount = openings.filter(function(entry){ return hasCategory(entry.item, "长期"); }).length;
    return { shortCount: shortCount, longCount: longCount };
  }

  function setStickyOffset(){
    if (!controls) return;
    var height = Math.ceil(controls.getBoundingClientRect().height);
    document.documentElement.style.setProperty("--control-h", height + "px");
  }

  function setupHeader(){
    if (!hasData) {
      summaryLine.textContent = "未能读取机会数据，请稍后刷新。";
      return;
    }
    var schools = new Set(openings.map(function(entry){ return normalizedSchool(entry.item); }));
    var counts = computedCounts();
    var synced = text(data.synced) || "未注明";
    summaryLine.textContent = "共 " + totalCount() + " 个机会 · 短期 " + counts.shortCount + " · 长期 " + counts.longCount + " · " + schools.size + " 所学校 · 最近更新 " + synced;
    var source = safeUrl(data.source);
    if (source) {
      sourceButton.href = source;
      sourceButton.hidden = false;
    }
  }

  function setupUniversities(){
    var schools = Array.from(new Set(openings.map(function(entry){ return normalizedSchool(entry.item); })));
    schools.sort(function(a, b){ return a.localeCompare(b, "en", { sensitivity: "base" }); });
    schools.forEach(function(school){
      var option = document.createElement("option");
      option.value = school;
      option.textContent = school;
      universitySelect.appendChild(option);
    });
  }

  function matches(entry, query, school, categories, types, terms){
    var item = entry.item;
    var itemSchool = normalizedSchool(item);
    if (school && itemSchool !== school) return false;
    if (categories.length && !categories.some(function(category){ return hasCategory(item, category); })) return false;
    if (query) {
      var haystack = [itemSchool, text(item.faculty), text(item.interests)].join(" ").toLowerCase();
      if (haystack.indexOf(query) === -1) return false;
    }
    if (types.length) {
      var itemTypes = Array.isArray(item.types) ? item.types.map(text).filter(Boolean) : [];
      if (!types.some(function(type){ return itemTypes.indexOf(type) !== -1; })) return false;
    }
    if (terms && terms.length) {
      var entryTerms = entry.terms || [];
      var hit = terms.some(function(term){
        if (term === "__past__") return isPastOnly(entry);
        return entryTerms.indexOf(term) !== -1;
      });
      if (!hit) return false;
    }
    return true;
  }

  function groupEntries(entries){
    var map = new Map();
    entries.forEach(function(entry){
      var school = normalizedSchool(entry.item);
      if (!map.has(school)) map.set(school, []);
      map.get(school).push(entry);
    });
    var groups = Array.from(map.keys()).map(function(school){
      var items = map.get(school).slice();
      items.sort(function(a, b){
        var catA = categoryOf(a.item) === "短期" ? 0 : 1;
        var catB = categoryOf(b.item) === "短期" ? 0 : 1;
        if (catA !== catB) return catA - catB;
        return a.index - b.index;
      });
      return {
        school: school,
        hasShort: items.some(function(entry){ return categoryOf(entry.item) === "短期"; }),
        items: items
      };
    });
    groups.sort(function(a, b){
      if (a.hasShort !== b.hasShort) return a.hasShort ? -1 : 1;
      return a.school.localeCompare(b.school, "en", { sensitivity: "base" });
    });
    return groups;
  }

  function makeFaculty(item){
    var faculty = text(item.faculty) || "未注明导师";
    var homepage = safeUrl(item.homepage);
    if (!homepage) return createText("span", "faculty", faculty);
    var link = createText("a", "faculty", faculty);
    link.href = homepage;
    link.target = "_blank";
    link.rel = "noopener";
    link.title = "导师主页";
    var arrow = createText("span", "faculty-arrow", "↗");
    link.appendChild(arrow);
    return link;
  }

  function makeBadge(value, extraClass){
    return createText("span", "badge" + (extraClass ? " " + extraClass : ""), value);
  }

  function makeContact(value){
    var contactText = text(value);
    var holder = document.createElement("span");
    holder.className = "contact";
    if (!contactText) return holder;
    appendPlain(holder, "联系：");
    if (emailPattern.test(contactText)) {
      var link = createText("a", "", contactText);
      link.href = "mailto:" + contactText;
      link.target = "_blank";
      link.rel = "noopener";
      holder.appendChild(link);
    } else {
      appendPlain(holder, contactText);
    }
    holder.title = contactText;
    return holder;
  }

  function appendDetailRow(dl, label, value, asContact){
    var content = text(value);
    if (!content) return;
    dl.appendChild(createText("dt", "", label));
    var dd = document.createElement("dd");
    if (asContact && emailPattern.test(content)) {
      var link = createText("a", "", content);
      link.href = "mailto:" + content;
      link.target = "_blank";
      link.rel = "noopener";
      dd.appendChild(link);
    } else {
      dd.textContent = content;
    }
    dl.appendChild(dd);
  }

  function makeDetailPanel(entry){
    var item = entry.item;
    var panel = document.createElement("div");
    panel.className = "detail-panel";
    panel.id = "detail-panel-" + entry.index;
    panel.hidden = !expanded;
    var dl = document.createElement("dl");
    appendDetailRow(dl, "职位", item.positions, false);
    appendDetailRow(dl, "要求", item.requirements, false);
    appendDetailRow(dl, "材料", item.materials, false);
    appendDetailRow(dl, "学期", item.term, false);
    appendDetailRow(dl, "截止", item.deadline, false);
    appendDetailRow(dl, "联系", item.contactAll || item.contact, true);
    if (!dl.children.length) {
      dl.appendChild(createText("dt", "", "信息"));
      dl.appendChild(createText("dd", "", "暂无更多信息"));
    }
    panel.appendChild(dl);
    return panel;
  }

  function makeRow(entry){
    var item = entry.item;
    var category = categoryOf(item);
    var row = document.createElement("article");
    row.className = "opening-row";

    var main = document.createElement("div");
    main.className = "row-main";
    main.appendChild(makeFaculty(item));
    main.appendChild(createText("span", "sep", "·"));

    var topic = createText("span", "topic", text(item.interests) || "方向未注明");
    topic.title = text(item.interests);
    main.appendChild(topic);

    var itemTypes = Array.isArray(item.types) ? item.types.map(text).filter(Boolean) : [];
    itemTypes.forEach(function(type){
      main.appendChild(makeBadge(type, ""));
    });

    if (category === "短期") {
      main.appendChild(makeBadge("短期", "short"));
      var deadline = text(item.deadline) || "未注明截止";
      var deadlineEl = createText("span", "when", "截止：" + deadline);
      deadlineEl.title = deadline;
      main.appendChild(deadlineEl);
    } else {
      main.appendChild(makeBadge("长期", "long"));
      var entryTerms = entry.terms || [];
      var upcoming = entryTerms.filter(function(t){ return t !== "滚动/全年" && !isPastTerm(t); });
      var termLabel;
      if (upcoming.length) termLabel = upcoming.join("、");
      else if (entryTerms.indexOf("滚动/全年") !== -1 || isPastOnly(entry)) termLabel = "滚动招生";
      else termLabel = text(item.term) || "长期";
      var termEl = createText("span", "when", "学期：" + termLabel);
      termEl.title = text(item.term) || termLabel;
      main.appendChild(termEl);
    }

    var contact = makeContact(item.contact);
    if (contact.textContent) main.appendChild(contact);

    var detailButton = document.createElement("button");
    detailButton.type = "button";
    detailButton.className = "details-toggle";
    detailButton.textContent = "详情";
    detailButton.setAttribute("aria-expanded", expanded ? "true" : "false");
    var panel = makeDetailPanel(entry);
    detailButton.setAttribute("aria-controls", panel.id);
    detailButton.addEventListener("click", function(){
      var isOpen = detailButton.getAttribute("aria-expanded") === "true";
      detailButton.setAttribute("aria-expanded", isOpen ? "false" : "true");
      panel.hidden = isOpen;
    });

    row.appendChild(main);
    row.appendChild(detailButton);
    row.appendChild(panel);
    return row;
  }

  function makeGroup(group){
    var section = document.createElement("section");
    section.className = "school-group";

    var head = document.createElement("div");
    head.className = "school-head";
    head.appendChild(createText("div", "school-name", group.school));
    var count = document.createElement("div");
    count.className = "school-count";
    count.appendChild(document.createTextNode(group.items.length + " 个职位"));
    var shortN = group.items.filter(function(entry){ return categoryOf(entry.item) === "短期"; }).length;
    if (shortN) {
      var shortTag = document.createElement("span");
      shortTag.className = "short";
      shortTag.textContent = " · " + shortN + " 短期";
      count.appendChild(shortTag);
    }
    head.appendChild(count);
    section.appendChild(head);

    group.items.forEach(function(entry){
      section.appendChild(makeRow(entry));
    });
    return section;
  }

  function showEmpty(message){
    clearElement(results);
    emptyMessage.textContent = message;
    emptyMessage.classList.remove("hidden");
  }

  function render(){
    setStickyOffset();
    if (!hasData) {
      resultCount.textContent = "显示 0 / 0";
      showEmpty("机会数据暂时不可用。请稍后刷新页面，或从首页重新进入。");
      return;
    }

    var query = text(searchInput.value).toLowerCase();
    var school = universitySelect.value;
    var categories = selectedValues(categoryInputs);
    var types = selectedValues(typeInputs);
    var terms = selectedValues(termInputs);
    var filtered = openings.filter(function(entry){
      return matches(entry, query, school, categories, types, terms);
    });
    resultCount.textContent = "显示 " + filtered.length + " / " + totalCount();

    if (!filtered.length) {
      showEmpty("没有匹配的机会。请调整关键词、学校、时效或类型筛选。");
      return;
    }

    var fragment = document.createDocumentFragment();
    groupEntries(filtered).forEach(function(group){
      fragment.appendChild(makeGroup(group));
    });
    emptyMessage.classList.add("hidden");
    emptyMessage.textContent = "";
    clearElement(results);
    results.appendChild(fragment);
  }

  function scheduleRender(){
    window.clearTimeout(searchTimer);
    searchTimer = window.setTimeout(render, 80);
  }

  function updateToggleButton(){
    toggleDetails.textContent = expanded ? "全部收起" : "全部展开";
    toggleDetails.setAttribute("aria-pressed", expanded ? "true" : "false");
  }

  toggleDetails.addEventListener("click", function(){
    expanded = !expanded;
    updateToggleButton();
    Array.prototype.forEach.call(results.querySelectorAll(".details-toggle"), function(button){
      button.setAttribute("aria-expanded", expanded ? "true" : "false");
    });
    Array.prototype.forEach.call(results.querySelectorAll(".detail-panel"), function(panel){
      panel.hidden = !expanded;
    });
  });

  resetButton.addEventListener("click", function(){
    searchInput.value = "";
    universitySelect.value = "";
    categoryInputs.concat(typeInputs).concat(termInputs).forEach(function(input){ input.checked = false; });
    expanded = false;
    updateToggleButton();
    render();
    searchInput.focus();
  });

  searchInput.addEventListener("input", scheduleRender);
  universitySelect.addEventListener("change", render);
  categoryInputs.concat(typeInputs).forEach(function(input){
    input.addEventListener("change", render);
  });
  window.addEventListener("resize", function(){
    window.clearTimeout(searchTimer);
    searchTimer = window.setTimeout(function(){
      setStickyOffset();
    }, 80);
  });

  openings = mergeEntities(openings);
  setupHeader();
  setupUniversities();
  setupTerms();
  updateToggleButton();
  render();
})();
</script>
</body>
</html>
