<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CS博士 · CS PhD</title>
<meta name="description" content="CS / AI / EE / Stats 博士社区,立足北美、面向全球。从入学前到毕业后:PhD 机会、实习与全职、审稿、未来的高端岗位。注册进群。" />
<style>
  :root{ --ink:#16181d; --muted:#5b6270; --line:#e6e8ec; --bg:#fff; --accent:#1f6feb; --accent-ink:#fff; --ok:#15803d; }
  *{box-sizing:border-box} html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Roboto,Helvetica,Arial,sans-serif;
       color:var(--ink); background:var(--bg); line-height:1.6; -webkit-font-smoothing:antialiased;}
  .wrap{max-width:720px; margin:0 auto; padding:24px 18px 64px}
  .brand{font-weight:700; font-size:18px}
  .brand .en{color:var(--muted); font-weight:600; font-size:13px; margin-left:6px}
  .hero{margin:26px 0 6px}
  .hero h1{font-size:25px; line-height:1.35; margin:0 0 8px}
  .hero p{font-size:16px; color:var(--muted); margin:0}
  .cta{display:inline-block; font-size:16px; font-weight:700; text-decoration:none;
       color:var(--accent-ink); background:var(--accent); padding:13px 26px; border-radius:10px}
  .cta.block{display:block; text-align:center; margin-top:8px}
  .hero .cta{margin-top:16px}
  .note{font-size:13px; color:var(--muted); margin-top:10px}
  .stats{display:flex; flex-wrap:wrap; gap:8px 22px; margin:22px 0 6px; padding:14px 0;
         border-top:1px solid var(--line); border-bottom:1px solid var(--line); font-size:14px; color:var(--muted)}
  .stats b{color:var(--ink); font-size:16px}
  .shots{display:flex; gap:12px; overflow-x:auto; padding:18px 0 6px; -webkit-overflow-scrolling:touch}
  .shot{flex:0 0 auto; width:200px; margin:0}
  .shot img{width:200px; height:300px; object-fit:cover; object-position:top;
            border:1px solid var(--line); border-radius:12px; background:#f3f4f6; display:block}
  .shot .cap{font-size:12px; color:var(--muted); margin-top:7px; text-align:center}
  .ph{width:200px; height:300px; border:1px dashed #cfd4db; border-radius:12px; display:flex;
      align-items:center; justify-content:center; text-align:center; font-size:12px; color:var(--muted); padding:14px}
  .chips{display:flex; flex-wrap:wrap; gap:8px; margin:16px 0 2px}
  .chip{font-size:13px; color:var(--ink); background:#eef1f6; border:1px solid var(--line); padding:5px 11px; border-radius:999px}
  .closing{margin-top:30px; padding:22px; background:#fbfbfc; border:1px solid var(--line); border-radius:14px; text-align:center}
  .closing p{margin:0 0 14px; font-size:15px; color:var(--ink)}
  footer{margin-top:34px; padding-top:18px; border-top:1px solid var(--line); font-size:12px; color:var(--muted); text-align:center}
  footer a{color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">

  <div class="brand">CS博士<span class="en">CS PhD</span></div>

  <section class="hero">
    <h1>从入学前到毕业后,陪你走过每一步</h1>
    <p>CS / AI / EE / Stats 博士社区,立足北美、面向全球。PhD 机会、实习与全职、审稿,以及未来的高端岗位。</p>
    <!-- ===== SETUP: replace the href with your Tencent 问卷 (wj.qq.com) form link ===== -->
    <a class="cta" href="TENCENT_FORM_URL">注册进群 →</a>
    <div class="note">注册后:加入对应微信群 + 按方向收到精准机会推送。</div>
  </section>

  <!-- scale + directions at a glance -->
  <div class="stats">
    <span><b>数千</b> 成员</span>
    <span><b>12+</b> 求职分享群</span>
    <span><b>400+</b> 教职 / RA 机会</span>
    <span><b>历年</b> NeurIPS / ICML / ACL / AAAI 开会群</span>
  </div>

  <!-- Drop screenshots into screenshots/ with these names (or edit src/captions). -->
  <div class="shots">
    <figure class="shot">
      <img src="./screenshots/groups.png" alt="求职分享群"
           onerror="this.outerHTML='&lt;div class=ph&gt;放 screenshots/groups.png&lt;br&gt;(求职群列表截图)&lt;/div&gt;'" />
      <figcaption class="cap">12+ 求职分享群,数千成员</figcaption>
    </figure>
    <figure class="shot">
      <img src="./screenshots/series.png" alt="系列群"
           onerror="this.outerHTML='&lt;div class=ph&gt;放 screenshots/series.png&lt;br&gt;(教职/AP/审稿/社交 群截图)&lt;/div&gt;'" />
      <figcaption class="cap">教职 · AP · 审稿 · 开会社交 系列群</figcaption>
    </figure>
    <figure class="shot">
      <img src="./screenshots/doc.png" alt="教职机会文档"
           onerror="this.outerHTML='&lt;div class=ph&gt;放 screenshots/doc.png&lt;br&gt;(400+ 教职/RA 机会文档截图)&lt;/div&gt;'" />
      <figcaption class="cap">400+ 教职 / RA 机会(共享文档)</figcaption>
    </figure>
  </div>

  <div class="chips">
    <span class="chip">求职分享</span><span class="chip">教职申请</span><span class="chip">AP 交流</span>
    <span class="chip">审稿机会</span><span class="chip">开会社交</span><span class="chip">PhD 申请</span>
  </div>

  <div class="closing">
    <p>一次注册,进群 + 精准机会推送。</p>
    <!-- ===== SETUP: same Tencent 问卷 link here ===== -->
    <a class="cta block" href="TENCENT_FORM_URL">注册进群 →</a>
  </div>

  <footer>csphd.org · <a href="#" id="privacyLink">隐私说明 Privacy</a></footer>
</div>
</body>
</html>
